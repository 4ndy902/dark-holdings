<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dark Holdings</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: radial-gradient(circle at center, #031b14, #020d0a);
    color: #eaeaea;
    overflow: hidden;
}

/* glow effect */
#glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,255,150,0.15), transparent 70%);
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
}

/* layout */
.container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
    padding: 80px;
}

/* LEFT SIDE */
.left {
    max-width: 600px;
}

.logo {
    width: 180px;
    margin-bottom: 30px;
    filter: brightness(0.9) contrast(1.2);
}

h1 {
    font-size: 72px;
    letter-spacing: 6px;
    font-weight: 400;
    margin: 0;
}

.subtitle {
    margin-top: 20px;
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0.6;
}

/* RIGHT CARD */
.card {
    width: 380px;
    padding: 40px;
    border-radius: 12px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0,255,150,0.2);
    box-shadow: 0 0 40px rgba(0,255,150,0.1);
}

.card h2 {
    text-align: center;
    font-weight: 400;
    letter-spacing: 3px;
    margin-bottom: 30px;
}

.input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
}

.button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #0f5132, #198754);
    border: none;
    color: white;
    letter-spacing: 2px;
    cursor: pointer;
}

.footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div id="glow"></div>

<div class="container">

    <div class="left">
        <img src="https://i.imgur.com/8QfQF7Q.png" class="logo">

        <h1>DARK<br>HOLDINGS</h1>

        <div class="subtitle">
            INVESTMENT & BUSINESS STRATEGY
        </div>
    </div>

    <div class="card">
        <h2>MEMBER ACCESS</h2>

        <input class="input" placeholder="Enter your access ID">
        <input class="input" type="password" placeholder="Enter your password">

        <button class="button">ENTER</button>
    </div>

</div>

<div class="footer">
If you wish to join, please send an email request to info@dark-holdings.com
</div>

<script>
const glow = document.getElementById("glow");

document.addEventListener("mousemove", (e) => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
