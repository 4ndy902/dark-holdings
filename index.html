<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Holdings | Investment & Business Strategy</title>
  <style>
    :root {
      --bg: #010303;
      --bg2: #03120d;
      --panel: rgba(3, 16, 12, 0.82);
      --panel-border: rgba(89, 151, 122, 0.16);
      --text: #ece7df;
      --muted: #7c9387;
      --green: #1f5f4a;
      --green2: #2b7a5f;
      --glow: rgba(70, 193, 140, 0.18);
      --field: rgba(5, 8, 8, 0.84);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 72% 18%, rgba(22, 101, 73, 0.22), transparent 18%),
        radial-gradient(circle at 83% 52%, rgba(22, 101, 73, 0.12), transparent 20%),
        radial-gradient(circle at 38% 52%, rgba(22, 101, 73, 0.16), transparent 22%),
        linear-gradient(90deg, #010303 0%, #02100c 50%, #04150f 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.045;
      pointer-events: none;
    }

    .cursor-glow {
      position: fixed;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(55, 200, 137, 0.20) 0%, rgba(55, 200, 137, 0.08) 34%, rgba(55, 200, 137, 0) 72%);
      mix-blend-mode: screen;
      transition: left 0.07s linear, top 0.07s linear;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 40px;
      align-items: center;
      padding: 34px 56px 60px;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 24px;
    }

    .logo-wrap {
      width: 220px;
      margin: 0 0 26px 150px;
      filter: drop-shadow(0 0 18px rgba(80, 170, 130, 0.16));
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .logo-wrap:hover {
      transform: translateY(-3px);
      filter: drop-shadow(0 0 28px rgba(80, 170, 130, 0.28));
    }

    .brand {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(58px, 6vw, 90px);
      font-weight: 400;
      letter-spacing: 8px;
      color: #ece7df;
      line-height: 0.98;
    }

    .line {
      width: 305px;
      height: 2px;
      margin: 24px 0 32px 165px;
      background: linear-gradient(to right, transparent, rgba(116, 255, 191, 0.85), transparent);
      box-shadow: 0 0 18px rgba(116, 255, 191, 0.3);
    }

    .sub {
      margin: 0 0 0 115px;
      color: #80998b;
      text-transform: uppercase;
      letter-spacing: 7px;
      font-size: 14px;
      white-space: nowrap;
    }

    .right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 470px;
      min-height: 640px;
      background: linear-gradient(180deg, rgba(3, 16, 12, 0.76), rgba(3, 13, 10, 0.9));
      border: 1px solid rgba(102, 161, 134, 0.14);
      border-radius: 12px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.015),
        0 0 42px rgba(0,0,0,0.36),
        0 0 32px rgba(65, 180, 130, 0.08);
      padding: 48px 46px;
      backdrop-filter: blur(8px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }

    .card:hover {
      border-color: rgba(102, 161, 134, 0.24);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 42px rgba(0,0,0,0.36),
        0 0 52px rgba(65, 180, 130, 0.14);
      transform: translateY(-2px);
    }

    .mini-logo {
      width: 72px;
      margin: 0 auto 26px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(80, 170, 130, 0.12));
    }

    .access-title {
      text-align: center;
      margin: 0 0 42px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      letter-spacing: 3px;
      font-weight: 400;
      color: #d8d4cc;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      margin-bottom: 12px;
      color: #7b9388;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 12px;
    }

    .field input {
      width: 100%;
      height: 54px;
      border: 1px solid rgba(82, 131, 108, 0.12);
      background: var(--field);
      color: #d7d7d3;
      border-radius: 2px;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .field input::placeholder {
      color: #69776f;
    }

    .field input:focus,
    .field input:hover {
      border-color: rgba(110, 177, 146, 0.22);
      box-shadow: 0 0 0 3px rgba(57, 132, 102, 0.08);
      background: rgba(8, 11, 11, 0.88);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 8px 0 30px;
      color: #7d8a83;
      font-size: 13px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .remember input {
      accent-color: #4fb587;
    }

    .forgot {
      color: #7d8a83;
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .forgot:hover {
      color: #b5c9be;
    }

    .btn {
      width: 100%;
      height: 54px;
      border: 1px solid rgba(84, 149, 119, 0.18);
      border-radius: 2px;
      background: linear-gradient(90deg, rgba(27, 89, 67, 0.95), rgba(31, 98, 73, 0.95));
      color: #e7e7e3;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(79, 181, 135, 0.18);
      filter: brightness(1.06);
    }

    .card-footer {
      margin-top: 42px;
      text-align: center;
      font-size: 14px;
      line-height: 1.55;
      color: #65746d;
    }

    .site-footer {
      position: fixed;
      bottom: 14px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #55635d;
      font-size: 12px;
      letter-spacing: 0.3px;
      z-index: 2;
    }

    .site-footer a {
      color: #8da899;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 1100px) {
      html, body {
        overflow: auto;
      }

      .page {
        grid-template-columns: 1fr;
        padding: 30px 24px 70px;
      }

      .left {
        align-items: center;
        text-align: center;
        padding-left: 0;
      }

      .logo-wrap,
      .line,
      .sub {
        margin-left: 0;
      }

      .brand {
        font-size: 52px;
      }

      .sub {
        white-space: normal;
        letter-spacing: 5px;
      }

      .card {
        min-height: auto;
      }

      .site-footer {
        position: static;
        padding-bottom: 20px;
      }
    }
  </style>
</head>
<body>

        <h2 class="access-title">Member Access</h2>

        <div class="field">

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" />

        <div class="row">
          <label class="remember">
            <input type="checkbox" checked />
            <span>Remember me</span>

          <a class="forgot" href="#">Forgot password?</a>

  </main>

  <div class="site-footer">
    If you wish to join, please send an email request to
    <a href="mailto:info@dark-holdings.com">info@dark-holdings.com</a>
  </div>

  <script>
    const glow = document.getElementById("cursorGlow");
    window.addEventListener("mousemove", (e) => {
      glow.style.left = e.clientX + "px";
      glow.style.top = e.clientY + "px";
    });
  </script>
</body>
</html>
